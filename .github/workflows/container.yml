name: Build and Push Container

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Compute image tags
      id: image_tags
      shell: bash
      run: |
        if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
          TAG="${GITHUB_REF_NAME}"
          {
            echo "tags<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY}:${TAG}"
            echo "ghcr.io/${GITHUB_REPOSITORY}:latest"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
        else
          # Convert branch names (e.g. feature/x) into Docker-compatible tags.
          BRANCH_TAG="$(echo "${GITHUB_REF_NAME}" | sed -E 's#[^A-Za-z0-9_.-]#-#g')"
          {
            echo "tags<<EOF"
            echo "ghcr.io/${GITHUB_REPOSITORY}:${BRANCH_TAG}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
        fi

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: container/Dockerfile
        push: true
        tags: ${{ steps.image_tags.outputs.tags }}
