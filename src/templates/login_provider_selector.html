<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Choose a Sign-in Provider</title>
        <style>
            :root {
                color-scheme: light;
                --bg: #f6f8fb;
                --card: #ffffff;
                --text: #1f2937;
                --muted: #6b7280;
                --primary: #0f172a;
                --primary-hover: #111827;
                --border: #e5e7eb;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: radial-gradient(circle at 10% 10%, #e0f2fe 0%, transparent 40%),
                    radial-gradient(circle at 90% 90%, #dcfce7 0%, transparent 40%), var(--bg);
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                color: var(--text);
            }

            .card {
                width: min(92vw, 420px);
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 24px;
                box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
            }

            h1 {
                margin: 0 0 8px;
                font-size: 1.3rem;
            }

            p {
                margin: 0 0 18px;
                color: var(--muted);
            }

            a.provider {
                display: inline-block;
                width: 100%;
                text-align: center;
                text-decoration: none;
                background: var(--primary);
                color: #fff;
                padding: 11px 14px;
                border-radius: 10px;
                font-weight: 600;
            }

            a.provider:hover,
            a.provider:focus-visible {
                background: var(--primary-hover);
            }
        </style>
    </head>
    <body>
        <main class="card">
            <h1>Sign in</h1>
            <p>Choose an identity provider to continue.</p>
            {% for provider in providers %}
            <a class="provider" href="/login/{{ provider.id }}">Continue with {{ provider.label }}</a>
            {% endfor %}
        </main>
    </body>
</html>
